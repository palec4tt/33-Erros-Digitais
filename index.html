<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>33 Erros Digitais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============ TOKENS ============ */
  :root{
    --bg:#0c0c0e;
    --bg-soft:#141416;
    --ink:#f3efe7;
    --ink-dim:#9a968f;
    --line: rgba(243,239,231,0.10);
    --accent:#9caf88;       /* muted sage, specimen-tag green */
    --accent-ink:#1b1f17;
    --radius:2px;
    --gap:6px;
    --tile-w:220px; /* fallback, recalculated in JS to match original fluid width */
    --a3-ratio: 0.70707; /* A3 portrait: 297mm / 420mm; tile height derives from this so nothing is cropped */
    --ease:cubic-bezier(.16,.84,.32,1);
  }
  html.light{
    --bg:#f4f1ea;
    --bg-soft:#ffffff;
    --ink:#15140f;
    --ink-dim:#6b665c;
    --line: rgba(21,20,15,0.12);
    --accent:#5a7048;
    --accent-ink:#f4f1ea;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    transition: background .4s var(--ease), color .4s var(--ease);
  }
  a{color:inherit;}
  button{font-family:inherit;}

  .mono{
    font-family:'Space Mono', monospace;
    letter-spacing:.06em;
    text-transform:uppercase;
  }

  /* ============ WALL ============ */
  .wall-wrap{
    position:relative;
    padding:110px 4px 4px;
  }
  .wall{
    display:flex;
    flex-direction:column;
    gap:6px;
    overflow:hidden;
  }

  .wall-row{
    display:flex;
    gap:6px;
    width:max-content;
    will-change: transform;
  }

  .tile{
    position:relative;
    overflow:hidden;
    border-radius:var(--radius);
    cursor:pointer;
    background:var(--bg-soft);
    border:0;
    padding:0;
    margin:0;
    display:block;
    flex:0 0 var(--tile-w);
    width:var(--tile-w);
    aspect-ratio: var(--a3-ratio);
  }
  .tile .placeholder{
    width:100%; height:100%; display:block; box-sizing:border-box;
    background:var(--bg-soft);
    border:1px solid var(--line);
    transition: transform .6s var(--ease), border-color .3s var(--ease);
  }
  .tile img{
    width:100%; height:100%; display:block;
    object-fit:cover; /* safe: tile box already matches the A3 ratio exactly */
    transition: transform .6s var(--ease);
  }
  .tile:hover img{ transform: scale(1.045); }
  .tile:hover .placeholder{ transform: scale(1.045); border-color: var(--ink-dim); }
  .tile:hover{ z-index:2; }

  .tile:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:-2px;
    z-index:3;
  }

  .tag{
    position:absolute; left:0; bottom:0; right:0;
    padding:8px 9px 7px;
    font-size:10px;
    color:#f3efe7;
    background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
    opacity:0; transform:translateY(6px);
    transition: opacity .25s var(--ease), transform .25s var(--ease);
    display:flex; justify-content:space-between; gap:6px;
    pointer-events:none;
  }
  .tile:hover .tag, .tile:focus-visible .tag{ opacity:1; transform:translateY(0); }

  @keyframes rise{
    from{ opacity:0; }
    to{ opacity:1; }
  }

  /* ============ INTRO CAPTION ============ */
  .intro{
    position:fixed; left:26px; bottom:26px; z-index:40;
    max-width:380px;
    pointer-events:none;
  }
  .intro .eyebrow{
    font-size:10px; color:var(--accent);
    display:flex; align-items:center; gap:8px;
    margin-bottom:10px;
  }
  .intro .eyebrow::before{
    content:''; width:18px; height:1px; background:var(--accent);
  }
  .intro h1{
    font-family:'Fraunces', serif;
    font-weight:500; font-style:italic;
    font-size:clamp(34px, 6vw, 56px);
    line-height:.95;
    margin:0 0 10px;
  }
  .intro p{
    font-size:13px; line-height:1.5; color:var(--ink-dim);
    margin:0;
    max-width:300px;
  }

  /* ============ VIEWER ============ */
  .viewer{
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    visibility:hidden;
  }
  .viewer[data-open="true"]{ visibility:visible; }

  .viewer-backdrop{
    position:absolute; inset:0;
    background: rgba(8,8,9,0);
    backdrop-filter: blur(0px);
    transition: background .45s var(--ease), backdrop-filter .45s var(--ease);
  }
  html.light .viewer-backdrop{ background: rgba(244,241,234,0); }
  .viewer[data-open="true"] .viewer-backdrop{
    background: rgba(8,8,9,.72);
    backdrop-filter: blur(14px);
  }
  html.light .viewer[data-open="true"] .viewer-backdrop{
    background: rgba(244,241,234,.82);
  }

  .viewer-body{
    position:relative; z-index:1;
    display:flex; align-items:center; gap:48px;
    width:min(1320px, 94vw);
    max-height:88vh;
    opacity:0; transform: scale(.96) translateY(10px);
    transition: opacity .4s var(--ease), transform .4s var(--ease);
  }
  .viewer[data-open="true"] .viewer-body{
    opacity:1; transform: scale(1) translateY(0);
  }

  .viewer-frame{
    flex: 1 1 48%;
    max-height:84vh;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .viewer-frame img{
    max-width:100%; max-height:84vh;
    object-fit:contain;
    border-radius:2px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  .viewer-placeholder{
    width: min(56vh, 60vw, 480px);
    aspect-ratio: var(--a3-ratio);
    max-height:84vh;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    position:relative;
    overflow:hidden;
  }
  .viewer-placeholder img{
    width:100%; height:100%;
    object-fit:cover; /* box already matches the A3 ratio, so nothing is cropped */
    display:block;
  }

  /* before/after compare overlay, sits on top of viewer-placeholder / image */
  .compare-before{
    position:absolute; inset:0;
    background:var(--bg-soft);
    clip-path: inset(0 calc(100% - var(--compare-pos, 50%)) 0 0);
    pointer-events:none;
    display:none;
  }
  .compare-active .compare-before{ display:block; }
  .compare-handle{
    position:absolute; top:0; bottom:0;
    left:var(--compare-pos, 50%);
    width:2px; background:var(--ink);
    transform:translateX(-1px);
    pointer-events:none;
    display:none;
    box-shadow: 0 0 0 1px rgba(0,0,0,.3);
  }
  .compare-active .compare-handle{ display:block; }
  .compare-grip{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:30px; height:30px; border-radius:50%;
    background:var(--ink); color:var(--bg);
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .compare-grip svg{ width:13px; height:13px; }
  .compare-label{
    position:absolute; bottom:10px;
    font-size:9px; letter-spacing:.08em; text-transform:uppercase;
    font-family:'Space Mono', monospace;
    color:var(--ink); background:rgba(0,0,0,.45);
    padding:4px 7px; border-radius:2px;
    pointer-events:none;
    display:none;
  }
  .compare-active .compare-label{ display:block; }
  .compare-label.before{ left:10px; }
  .compare-label.after{ right:10px; }

  .viewer-panel{
    flex: 1 1 40%;
    max-width:440px;
    max-height:84vh;
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .viewer-panel .blurb{
    flex:0 0 auto;
    font-size:14px; line-height:1.65; color:var(--ink);
    margin:0 0 22px;
  }

  /* effects disclosure */
  .effects{
    border-top:1px solid var(--line);
    padding-top:16px;
    margin-bottom:18px;
    flex:0 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  .effects[open]{
    flex:1 1 auto;
  }
  .effects summary{
    list-style:none;
    cursor:pointer;
    display:flex; align-items:center; justify-content:space-between;
    font-size:11px; color:var(--ink-dim);
    user-select:none;
    flex:0 0 auto;
  }
  .effects summary::-webkit-details-marker{ display:none; }
  .effects summary .chev{
    width:9px; height:9px;
    transition: transform .3s var(--ease);
  }
  .effects[open] summary .chev{ transform: rotate(180deg); }
  .effects-list{
    list-style:none; margin:4px 0 0; padding:4px 4px 4px 0;
    display:flex; flex-direction:column;
    flex:1 1 auto;
    min-height:0;
    max-height: clamp(160px, 38vh, 420px);
    overflow-y:auto;
    scroll-behavior:smooth;
    scrollbar-width:thin;
    scrollbar-color: var(--ink-dim) transparent;
    transition: mask-image .25s var(--ease), -webkit-mask-image .25s var(--ease);
  }
  .effects-list::-webkit-scrollbar{ width:5px; }
  .effects-list::-webkit-scrollbar-track{ background:transparent; }
  .effects-list::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
  .effects-list::-webkit-scrollbar-thumb:hover{ background:var(--ink-dim); }
  .effects-list.has-more-below{
    mask-image: linear-gradient(to bottom, #000 calc(100% - 28px), transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 28px), transparent 100%);
  }
  .effects-list li{
    padding:14px 0;
    border-top:1px solid var(--line);
  }
  .effects-list li:first-child{ border-top:0; padding-top:10px; }
  .fx-row{
    display:flex; align-items:baseline; justify-content:space-between;
    gap:14px;
  }
  .effects-list .fx-name{
    color:var(--ink);
    font-weight:600;
    font-size:12.5px;
    flex:0 0 auto;
  }
  .effects-list .fx-value{
    color:var(--accent);
    font-family:'Space Mono', monospace;
    font-size:10.5px;
    letter-spacing:.02em;
    text-align:right;
    flex:0 1 auto;
  }
  .effects-list .fx-desc{
    color:var(--ink-dim);
    font-size:12px;
    line-height:1.55;
    margin-top:6px;
    padding-right:4px;
  }

  /* before/after toggle */
  .compare-toggle{
    border:1px solid var(--line);
    background:transparent; color:var(--ink);
    font-size:12px; padding:11px 18px; border-radius:30px;
    cursor:pointer; transition: all .2s var(--ease);
    display:inline-flex; align-items:center; gap:8px;
  }
  .compare-toggle:hover{ border-color:var(--ink); }
  .compare-toggle[aria-pressed="true"]{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .compare-toggle svg{ width:13px; height:13px; }

  /* viewer chrome: close / prev / next / counter */
  .viewer-close{
    position:absolute; top:28px; right:28px; z-index:5;
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--line); background:var(--bg-soft); color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; transform:translateY(-6px);
    transition: opacity .4s var(--ease) .1s, transform .4s var(--ease) .1s;
  }
  .viewer[data-open="true"] .viewer-close{ opacity:1; transform:translateY(0); }
  .viewer-close svg{ width:14px; height:14px; }

  .viewer-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:42px; height:42px; border-radius:50%;
    border:1px solid var(--line); background:var(--bg-soft); color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:5;
    opacity:0; transition: opacity .4s var(--ease) .15s, border-color .2s;
  }
  .viewer[data-open="true"] .viewer-arrow{ opacity:1; }
  .viewer-arrow:hover{ border-color:var(--ink); }
  .viewer-arrow.prev{ left:24px; }
  .viewer-arrow.next{ right:24px; }
  .viewer-arrow svg{ width:16px; height:16px; }

  .viewer-counter{
    position:absolute; left:28px; top:30px; z-index:5;
    font-size:11px; color:var(--ink-dim);
    opacity:0; transition: opacity .4s var(--ease) .15s;
  }
  .viewer[data-open="true"] .viewer-counter{ opacity:1; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px){
    .nav{ display:none; }
    .intro{ max-width:260px; }
    .intro h1{ font-size:34px; }
    .wall{ --tile-w:130px; }
    .viewer-body{
      flex-direction:column; gap:18px; width:94vw; max-height:90vh;
      overflow-y:auto; padding:10px 0 30px;
    }
    .viewer-frame{ max-height:50vh; }
    .viewer-frame img{ max-height:50vh; }
    .viewer-panel{ max-width:none; padding:0 18px; max-height:none; }
    .effects-list{ max-height:none; overflow-y:visible; mask-image:none; -webkit-mask-image:none; }
    .viewer-arrow{ width:36px; height:36px; }
    .viewer-arrow.prev{ left:10px; }
    .viewer-arrow.next{ right:10px; }
  }

  @media (prefers-reduced-motion: reduce){
    .tile, .tile .placeholder, .viewer-body, .viewer-backdrop, .viewer-close, .viewer-arrow, .viewer-counter{
      transition:none !important; animation:none !important;
    }
  }
</style>
</head>
<body>
  <div class="wall-wrap">
    <div class="wall" id="wall"></div>
  </div>

  <div class="intro">
    <h1>33&nbsp;Erros&nbsp;Digitais</h1>
    <p>Trabalho realizado por Dinis Soares</p>
  </div>

  <div class="viewer" id="viewer" data-open="false" role="dialog" aria-modal="true" aria-label="Detalhe da imagem">
    <div class="viewer-backdrop" id="viewer-backdrop"></div>

    <span class="viewer-counter mono" id="viewer-counter">01 / 33</span>

    <button class="viewer-close" id="viewer-close" aria-label="Fechar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 5l14 14M19 5L5 19"/></svg>
    </button>
    <button class="viewer-arrow prev" id="viewer-prev" aria-label="Imagem anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <button class="viewer-arrow next" id="viewer-next" aria-label="Imagem seguinte">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
    </button>

    <div class="viewer-body">
      <div class="viewer-frame" id="viewer-frame">
        <div id="viewer-img" class="viewer-placeholder">
          <img id="viewer-img-el" alt="">
          <div class="compare-before" id="compare-before"></div>
          <div class="compare-handle" id="compare-handle">
            <div class="compare-grip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 7l-5 5 5 5M16 7l5 5-5 5"/></svg>
            </div>
          </div>
          <span class="compare-label before" id="compare-label-before">Antes</span>
          <span class="compare-label after" id="compare-label-after">Depois</span>
        </div>
      </div>
      <div class="viewer-panel">
        <p class="blurb" id="viewer-blurb">Legenda.</p>

        <details class="effects" id="effects-disclosure">
          <summary class="mono">
            <span>Efeitos utilizados</span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </summary>
          <ul class="effects-list" id="effects-list"></ul>
        </details>

        <button class="compare-toggle" id="compare-toggle" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 7l-5 5 5 5M16 7l5 5-5 5"/></svg>
          <span id="compare-toggle-label">Comparar antes / depois</span>
        </button>
      </div>
    </div>
  </div>

<script>
/* =========================================================
   FRAME DATA: 33 frames, every tile the same size (A3 ratio).
   `file` maps each entry to its final photo in /Fotos Finais
   and its pre-edit photo in /Fotos Antes (named "A IMG <n>.webp").
   ========================================================= */
// Efeitos por imagem, indexados pelo número do ficheiro (ex: "IMG 7.webp" -> 7).
// Vamos preenchendo imagem a imagem; as que ainda não têm entrada aqui usam o placeholder por defeito.
const EFFECTS_BY_NUM = {
  1: [
    { name: "Corrupção de canal", value: "Duotone vermelho-âmbar", desc: "Os canais de cor originais são substituídos por um mapa de duotone (Image > Mode > Duotone ou um Gradient Map), reduzindo toda a imagem a uma escala entre o vermelho e o âmbar." },
    { name: "Esmagamento de pretos", value: "Contraste extremo", desc: "A pupila e as pestanas colapsam num preto absoluto: os pontos pretos do canal são puxados via Curves ou Levels até cortar toda a informação de sombra nessa zona." },
    { name: "Saturação de sinal", value: "Levada ao limite", desc: "O branco do olho e a pele são empurrados para o limite de clipping, com a saturação no máximo via Hue/Saturation, perdendo gradação nas zonas mais claras." },
    { name: "Ruído", value: "Visível", desc: "Uma camada de grão é aplicada sobre a imagem toda (Filter > Noise > Add Noise), aproximando-a da textura de uma fotografia analógica de alta sensibilidade." },
  ],
  2: [
    { name: "Corrupção de canal", value: "Duotone vermelho", desc: "A paleta original é reduzida a um vermelho quase monocromático através de um Duotone ou Gradient Map, descartando os restantes canais de cor." },
    { name: "Inversão de tons", value: "Parcial", desc: "A sobrancelha e o branco do olho invertem de claro para escuro, resultado de uma máscara local com Invert (Ctrl/Cmd+I) aplicada só a essa seleção." },
    { name: "Esmagamento de pretos", value: "Contraste extremo", desc: "A íris e o canto interior do olho desaparecem num preto absoluto, com o ponto preto puxado via Curves até eliminar o detalhe nessa zona." },
    { name: "Ruído", value: "Visível", desc: "Interferência granulada espalhada pela imagem (Add Noise), mais densa no fundo vermelho." },
    { name: "Vinheta", value: "Marcada", desc: "Os cantos escurecem de forma mais agressiva que o centro através de uma vinheta (Lens Correction ou uma camada de Levels com máscara radial)." },
  ],
  3: [
    { name: "Pixelização", value: "Seletiva", desc: "A figura humana e o cão são dissolvidos num mosaico de blocos de cor, resultado do filtro Mosaic ou Pixelate aplicado apenas a essa seleção." },
  ],
  4: [
    { name: "Pixelização", value: "Blocos grandes, figura inteira", desc: "A figura humana é decomposta numa grelha de blocos quadrados de grande dimensão, do cabelo às calças, com o filtro Mosaic configurado para um tamanho de célula elevado; o contorno do corpo e da T-shirt perde a curva natural e fica recortado em ângulos retos que seguem essa grelha, mais visível nos ombros e nos braços cruzados." },
  ],
  5: [
    { name: "Substituição de textura", value: "Nebulosa em silhueta", desc: "A silhueta do homem deixa de conter pele, roupa ou rosto e passa a estar preenchida por uma imagem de nebulosa estelar em tons de laranja, rosa e violeta, colada numa camada própria e recortada pela máscara da silhueta (clipping mask)." },
    { name: "Desfocagem radial", value: "Esticada a partir do sujeito", desc: "Os troncos das árvores e os fetos em redor da figura esticam-se para fora, resultado de um Radial Blur em modo Zoom centrado no sujeito." },
  ],
  6: [
    { name: "Preenchimento de silhueta", value: "Azul sólido, sem detalhe", desc: "As duas figuras perdem toda a informação de cor e textura (casacos, pele, óculos) e ficam reduzidas a um bloco sólido de azul, preenchido com Fill numa camada recortada pela silhueta." },
    { name: "Sobreposição de texto", value: "Estética de erro de sistema", desc: "Sobre as silhuetas surgem fragmentos de texto branco em tipo de letra monoespaçado, com frases cortadas a meio e referências a deteção de erro e memória, adicionados com a ferramenta Text numa camada própria por cima da imagem." },
  ],
  7: [
    { name: "Corrupção de canal", value: "Duotone preto-ciano", desc: "A paleta quente avermelhada da fotografia original é substituída por um duotone preto-ciano, aplicado via Gradient Map ou Duotone." },
    { name: "Posterização", value: "Poucos níveis de tom", desc: "Os gradientes suaves da pele e do cabelo são reduzidos a blocos de tom plano com contornos abruptos, resultado do filtro Posterize com um número baixo de níveis." },
    { name: "Ruído", value: "Textura granulada mantida", desc: "A camada de grão presente na fotografia original mantém-se visível sobre a nova paleta, acentuada pelo contraste mais duro entre as áreas claras e escuras." },
  ],
  8: [
    { name: "Distorção por arrastamento horizontal", value: "Metade direita do rosto esticada", desc: "O lado direito do rosto, incluindo o olho, a boca e o maxilar, é esticado horizontalmente com a ferramenta Liquify (modo Push Left/Right ou Warp), derretendo os traços faciais nessa zona enquanto o lado esquerdo permanece intocado; o olho direito aumenta de tamanho e muda de forma como consequência direta desse arrasto, com o branco do olho a expandir-se de forma anómala em relação ao olho esquerdo." },
    { name: "Riscas de varrimento", value: "Topo do cabelo", desc: "No limite superior da testa e do cabelo surgem riscas horizontais finas, criadas com uma seleção retangular repetida e um leve deslocamento (offset) entre cada faixa." },

  10: [

// shuffle into a random order on every page load
(function shuffleFrames(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
})(FRAMES);

/* ============ RENDER WALL (3 looping rows) ============ */
const wallEl = document.getElementById("wall");
const COLS = 11;
const ROWS = 3;

// split the 33 frames into 3 rows of 11
const rowFrames = [0, 1, 2].map(r => FRAMES.slice(r * COLS, r * COLS + COLS));

function makeTile(f, globalIndex){
  const tile = document.createElement("button");
  tile.className = "tile";
  tile.setAttribute("data-index", globalIndex);
  tile.setAttribute("aria-label", `Abrir moldura ${String(f.id).padStart(2,"0")}`);

  if (f.src){
    const img = document.createElement("img");
    img.src = f.src;
    img.alt = "";
    img.loading = "lazy";
    img.decoding = "async";
    tile.appendChild(img);
  } else {
    const placeholder = document.createElement("div");
    placeholder.className = "placeholder";
    tile.appendChild(placeholder);
  }

  tile.addEventListener("click", () => openViewer(globalIndex));
  return tile;
}

const rowEls = [];      // the 3 .wall-row elements
const rowDirs = [1, -1, 1]; // row1 & row3 move right, row2 moves left
const rowSpeeds = [22, 18, 22]; // px/sec
const rowOffsets = [0, 0, 0];   // current scroll offset per row
let rowSetWidth = [0, 0, 0];    // width of ONE set of 11 tiles (for wrapping)

rowFrames.forEach((frames, r) => {
  const rowEl = document.createElement("div");
  rowEl.className = `wall-row row-${r + 1}`;

  // duplicate the row's tiles so the strip can loop seamlessly:
  // [11 tiles][11 tiles][11 tiles]; middle copy is what's visible at rest
  for (let copy = 0; copy < 3; copy++){
    frames.forEach((f, i) => {
      const globalIndex = r * COLS + i;
      rowEl.appendChild(makeTile(f, globalIndex));
    });
  }

  wallEl.appendChild(rowEl);
  rowEls.push(rowEl);
});

/* ============ WALL "PARTING" HOVER EFFECT ============ */
const RADIUS = 240;
const MAX_PUSH = 22;
let mouse = { x: -9999, y: -9999 };
let frozen = false;

const wallWrap = document.querySelector(".wall-wrap");
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
setTileWidth();

wallWrap.addEventListener("mousemove", (e) => {
  const wrapRect = wallWrap.getBoundingClientRect();
  mouse.x = e.clientX - wrapRect.left;
  mouse.y = e.clientY - wrapRect.top;
});
wallWrap.addEventListener("mouseleave", () => {
  mouse.x = -9999; mouse.y = -9999;
});

/* ============ COMBINED SCROLL + PARTING LOOP ============ */
function setTileWidth(){
  // width fills 11 columns + 10 gaps across the wall; tile height then follows
  // automatically via the A3 aspect-ratio set in CSS, so no image gets cropped
  const wrapRect = wallWrap.getBoundingClientRect();
  const gap = 6;
  const w = (wrapRect.width - gap * (COLS - 1)) / COLS;
  document.documentElement.style.setProperty("--tile-w", `${w.toFixed(2)}px`);
}

let hasCalibratedOnce = false;

function measureRowSetWidth(){
  rowEls.forEach((rowEl, r) => {
    const tiles = rowEl.children;
    const oneSetCount = COLS;
    if (tiles.length < oneSetCount + 1) return;
    // width of one set = position of the (COLS)-th tile minus position of the 1st
    const first = tiles[0].getBoundingClientRect();
    const afterSet = tiles[oneSetCount].getBoundingClientRect();
    const newWidth = afterSet.left - first.left;
    if (newWidth <= 0) return; // not laid out yet, skip; keep previous value

    const prevWidth = rowSetWidth[r];
    rowSetWidth[r] = newWidth;

    if (!hasCalibratedOnce || prevWidth <= 0){
      // first real measurement for this row: center it in the middle copy
      rowOffsets[r] = -newWidth;
    } else if (Math.abs(newWidth - prevWidth) > 0.5){
      // width genuinely changed (e.g. viewport resize); rescale the
      // current offset proportionally instead of snapping back to center,
      // so a row mid-flight doesn't jump or desync from its visible tiles
      const ratio = newWidth / prevWidth;
      rowOffsets[r] *= ratio;
    }
    rowEl.style.transform = `translate3d(${rowOffsets[r]}px,0,0)`;
  });
  hasCalibratedOnce = true;
}

let lastTime = null;
function tick(t){
  if (lastTime === null) lastTime = t;
  const dt = (t - lastTime) / 1000;
  lastTime = t;

  const wrapRect = wallWrap.getBoundingClientRect();

  rowEls.forEach((rowEl, r) => {
    if (!reduceMotion){
      rowOffsets[r] += rowDirs[r] * rowSpeeds[r] * dt;
      // wrap seamlessly once we've drifted a full set-width in either direction
      if (rowSetWidth[r] > 0){
        const limit = rowSetWidth[r];

        while (rowOffsets[r] <= -limit * 2){
          rowOffsets[r] += limit;
        }

        while (rowOffsets[r] >= 0){
          rowOffsets[r] -= limit;
        }
      }
    }

    const tiles = rowEl.children;
    for (let i = 0; i < tiles.length; i++){
      const tile = tiles[i];
      let px = 0, py = 0, scale = 1;

      if (!frozen){
        const r2 = tile.getBoundingClientRect();
        const cx = r2.left + r2.width / 2 - wrapRect.left;
        const cy = r2.top + r2.height / 2 - wrapRect.top;
        const dx = cx - mouse.x;
        const dy = cy - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < RADIUS){
          const factor = 1 - dist / RADIUS;
          const angle = Math.atan2(dy, dx);
          px = Math.cos(angle) * factor * MAX_PUSH;
          py = Math.sin(angle) * factor * MAX_PUSH;
          scale = 1 - factor * 0.05;
        }
      }
      tile.style.transform = `translate(${px.toFixed(1)}px, ${py.toFixed(1)}px) scale(${scale.toFixed(3)})`;
    }

    rowEl.style.transform = `translate3d(${rowOffsets[r].toFixed(2)}px,0,0)`;
    rowEl.style.willChange = "transform";
  });

  requestAnimationFrame(tick);
}

function calibrate(){
  setTileWidth();
  measureRowSetWidth();
}

window.addEventListener("load", calibrate);
window.addEventListener("resize", calibrate);
setTimeout(calibrate, 300); // after font/image layout settles
requestAnimationFrame(tick);

/* ============ VIEWER ============ */
const viewer = document.getElementById("viewer");
const vBlurb = document.getElementById("viewer-blurb");
const vCounter = document.getElementById("viewer-counter");
const vEffectsList = document.getElementById("effects-list");
const vEffectsDisclosure = document.getElementById("effects-disclosure");
const vCompareToggle = document.getElementById("compare-toggle");
const vCompareToggleLabel = document.getElementById("compare-toggle-label");
const vFrame = document.getElementById("viewer-frame");
const vImg = document.getElementById("viewer-img");
const vImgEl = document.getElementById("viewer-img-el");
const vCompareBefore = document.getElementById("compare-before");
const vCompareHandle = document.getElementById("compare-handle");

let current = 0;
let lastFocused = null;
let compareOn = false;

function renderViewer(i){
  const f = FRAMES[i];
  vBlurb.textContent = f.blurb;
  vCounter.textContent = `${String(i+1).padStart(2,"0")} / ${FRAMES.length}`;

  // main image
  if (f.src){
    vImgEl.src = f.src;
    vImgEl.style.display = "block";
  } else {
    vImgEl.style.display = "none";
  }

  // "before" overlay: a real unedited image if provided, otherwise the same
  // photo with a filter applied as a stand-in so the slider has something to compare
  if (f.beforeSrc){
    vCompareBefore.style.backgroundImage = `url("${f.beforeSrc}")`;
    vCompareBefore.style.backgroundSize = "cover";
    vCompareBefore.style.backgroundPosition = "center";
    vCompareBefore.style.filter = "none";
  } else if (f.src){
    vCompareBefore.style.backgroundImage = `url("${f.src}")`;
    vCompareBefore.style.backgroundSize = "cover";
    vCompareBefore.style.backgroundPosition = "center";
    vCompareBefore.style.filter = "saturate(1.4) contrast(0.92)"; /* stand-in until a real "before" photo is added */
  } else {
    vCompareBefore.style.backgroundImage = "";
    vCompareBefore.style.filter = "saturate(1.4) contrast(0.92)";
  }

  // effects list
  vEffectsList.innerHTML = "";
  (f.effects || []).forEach(fx => {
    const li = document.createElement("li");
    li.innerHTML = `
      <div class="fx-row">
        <span class="fx-name">${fx.name}</span>
        <span class="fx-value">${fx.value || ""}</span>
      </div>
      ${fx.desc ? `<p class="fx-desc">${fx.desc}</p>` : ""}
    `;
    vEffectsList.appendChild(li);
  });
  vEffectsDisclosure.open = false;
  vEffectsList.scrollTop = 0;
  requestAnimationFrame(updateEffectsFade);

  // reset compare state on every new image
  setCompare(false);
}

function updateEffectsFade(){
  if (!vEffectsList) return;
  const overflowing = vEffectsList.scrollHeight - vEffectsList.clientHeight > 4;
  const nearBottom = vEffectsList.scrollTop + vEffectsList.clientHeight >= vEffectsList.scrollHeight - 4;
  vEffectsList.classList.toggle("has-more-below", overflowing && !nearBottom);
}
vEffectsList.addEventListener("scroll", updateEffectsFade);
vEffectsDisclosure.addEventListener("toggle", () => {
  if (vEffectsDisclosure.open) requestAnimationFrame(updateEffectsFade);
});
window.addEventListener("resize", () => {
  if (vEffectsDisclosure.open) updateEffectsFade();
});

function setCompare(on){
  compareOn = on;
  vImg.classList.toggle("compare-active", on);
  vCompareToggle.setAttribute("aria-pressed", String(on));
  vCompareToggleLabel.textContent = on ? "A ver o antes" : "Comparar antes / depois";
  if (on) setComparePos(50);
}

function setComparePos(percent){
  const clamped = Math.max(0, Math.min(100, percent));
  vImg.style.setProperty("--compare-pos", `${clamped}%`);
}

vCompareToggle.addEventListener("click", () => setCompare(!compareOn));

// drag to move the before/after split
let dragging = false;
function posFromEvent(e){
  const rect = vImg.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return (x / rect.width) * 100;
}
vCompareHandle.style.pointerEvents = "none";
vImg.addEventListener("pointerdown", (e) => {
  if (!compareOn) return;
  dragging = true;
  setComparePos(posFromEvent(e));
});
window.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  setComparePos(posFromEvent(e));
});
window.addEventListener("pointerup", () => { dragging = false; });

function openViewer(i){
  current = i;
  lastFocused = document.activeElement;
  renderViewer(i);
  viewer.setAttribute("data-open", "true");
  frozen = true;
  document.body.style.overflow = "hidden";
  document.getElementById("viewer-close").focus();
}

function closeViewer(){
  viewer.setAttribute("data-open", "false");
  frozen = false;
  document.body.style.overflow = "";
  if (lastFocused) lastFocused.focus();
}

function step(dir){
  current = (current + dir + FRAMES.length) % FRAMES.length;
  renderViewer(current);
}

document.getElementById("viewer-close").addEventListener("click", closeViewer);
document.getElementById("viewer-backdrop").addEventListener("click", closeViewer);
document.getElementById("viewer-prev").addEventListener("click", () => step(-1));
document.getElementById("viewer-next").addEventListener("click", () => step(1));

document.addEventListener("keydown", (e) => {
  if (viewer.getAttribute("data-open") !== "true") return;
  if (e.key === "Escape") closeViewer();
  if (e.key === "ArrowLeft") step(-1);
  if (e.key === "ArrowRight") step(1);
});

/* ============ THEME TOGGLE ============ */
const lightBtn = document.getElementById("theme-light");
const darkBtn = document.getElementById("theme-dark");

function setTheme(light){
  document.documentElement.classList.toggle("light", light);
  lightBtn.setAttribute("aria-pressed", String(light));
  darkBtn.setAttribute("aria-pressed", String(!light));
}
lightBtn.addEventListener("click", () => setTheme(true));
darkBtn.addEventListener("click", () => setTheme(false));
</script>
